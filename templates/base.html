<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}CyberScan{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #080b14;
      --bg-card: #0d1117;
      --bg-surface: #131929;
      --bg-hover: #1a2236;
      --border: #1e2d45;
      --border-light: #253347;
      --cyan: #00d4ff;
      --cyan-dim: #00d4ff22;
      --cyan-glow: 0 0 20px #00d4ff44;
      --text-primary: #e8edf5;
      --text-secondary: #7c8db5;
      --text-muted: #4a5568;
      --critical: #ff3b3b;
      --high: #ff6b2b;
      --medium: #f0a500;
      --low: #4fa3e0;
      --info: #7c8db5;
      --success: #00c896;
      --radius: 8px;
      --radius-lg: 12px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg-dark);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* Nav */
    nav {
      border-bottom: 1px solid var(--border);
      background: rgba(8,11,20,0.95);
      backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 100;
      padding: 0 24px;
    }
    .nav-inner {
      max-width: 1100px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      height: 60px;
    }
    .nav-logo {
      font-size: 18px; font-weight: 900; letter-spacing: 3px;
      color: var(--cyan); text-decoration: none;
    }
    .nav-logo span { color: var(--text-secondary); font-weight: 300; }
    .nav-links { display: flex; gap: 24px; align-items: center; }
    .nav-links a {
      color: var(--text-secondary); text-decoration: none; font-size: 13px;
      font-weight: 500; transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--cyan); }

    /* Main */
    main {
      max-width: 1100px; margin: 0 auto;
      padding: 48px 24px;
    }

    /* Cards */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 32px;
    }
    .card-sm { padding: 20px 24px; }

    /* Badges */
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px;
    }
    .badge-critical { background: #ff3b3b22; color: var(--critical); border: 1px solid #ff3b3b44; }
    .badge-high { background: #ff6b2b22; color: var(--high); border: 1px solid #ff6b2b44; }
    .badge-medium { background: #f0a50022; color: var(--medium); border: 1px solid #f0a50044; }
    .badge-low { background: #4fa3e022; color: var(--low); border: 1px solid #4fa3e044; }
    .badge-info { background: #7c8db522; color: var(--info); border: 1px solid #7c8db544; }
    .badge-unknown { background: #55555522; color: #888; border: 1px solid #55555544; }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 20px; border-radius: var(--radius);
      font-size: 13px; font-weight: 600; cursor: pointer;
      text-decoration: none; border: none; transition: all 0.2s;
    }
    .btn-primary {
      background: var(--cyan); color: #080b14;
    }
    .btn-primary:hover { background: #33ddff; box-shadow: var(--cyan-glow); }
    .btn-ghost {
      background: transparent; color: var(--text-secondary);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { border-color: var(--cyan); color: var(--cyan); }
    .btn-lg { padding: 14px 28px; font-size: 15px; }

    /* Table */
    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left; font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 1px;
      color: var(--text-secondary); padding: 10px 16px;
      border-bottom: 1px solid var(--border);
    }
    td { padding: 12px 16px; border-bottom: 1px solid var(--border); color: var(--text-primary); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--bg-hover); }

    /* Mono */
    .mono { font-family: 'JetBrains Mono', monospace; font-size: 12px; }

    /* Divider */
    .divider { border: none; border-top: 1px solid var(--border); margin: 32px 0; }

    /* Alert */
    .alert {
      padding: 14px 18px; border-radius: var(--radius);
      border: 1px solid; margin-bottom: 20px; font-size: 13px;
    }
    .alert-error { background: #ff3b3b11; border-color: #ff3b3b44; color: #ff8080; }
    .alert-success { background: #00c89611; border-color: #00c89644; color: #00c896; }

    /* Section header */
    .section-header { margin-bottom: 28px; }
    .section-header h1 { font-size: 28px; font-weight: 700; margin-bottom: 6px; }
    .section-header p { color: var(--text-secondary); font-size: 14px; }

    /* Pulse dot */
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.3)} }
    .pulse-dot { width: 8px; height: 8px; border-radius: 50%; animation: pulse 1.5s ease-in-out infinite; }
    .pulse-cyan { background: var(--cyan); }

    /* Glow line */
    .glow-line { height: 2px; background: linear-gradient(90deg, var(--cyan) 0%, transparent 100%); border-radius: 2px; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <nav>
    <div class="nav-inner">
      <a class="nav-logo" href="/">CYBER<span>SCAN</span></a>
      <div class="nav-links">
        <a href="/">New Scan</a>
        <a href="/#history">History</a>
      </div>
    </div>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
